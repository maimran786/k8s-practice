apiVersion: v1
kind: Pod
metadata:
  name: postgres-db-pod
  labels:
    app: postgres-db
spec:
  containers:
    - name: postgres-db-container
      image: postgres:15-alpine
      ports:
        - name: postgres
          containerPort: 5432
      env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres"
        - name: POSTGRES_DB
          value: "postgres"